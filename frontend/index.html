<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">
    <div class="container">
      <header>
        <div class="header-top">
          <div class="header-title">
            <h1><i class="fas fa-check-double"></i> Daily Notes</h1>
            <p class="subtitle">Anotações rápidas para sua daily</p>
          </div>
          <button id="themeToggle" class="theme-toggle" title="Alternar tema">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </header>

      <div class="input-section">
        <textarea 
          id="noteInput" 
          placeholder="O que você está trabalhando hoje?" 
          rows="3"
        ></textarea>
        <div class="button-group">
          <select id="prioritySelect" class="priority-select">
            <option value="normal">📌 Normal</option>
            <option value="high">🔴 Alta</option>
            <option value="low">🟢 Baixa</option>
          </select>
          <button id="addNoteBtn" class="btn-primary">
            <i class="fas fa-plus"></i> Adicionar
          </button>
        </div>
        <div class="keyboard-hint">
          <small>💡 <strong>Ctrl+Enter</strong> para adicionar | <strong>Ctrl+D</strong> marca concluída</small>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">
            <i class="fas fa-list"></i> Todas
          </button>
          <button class="filter-btn" data-filter="pending">
            <i class="fas fa-hourglass-half"></i> Pendentes
          </button>
          <button class="filter-btn" data-filter="completed">
            <i class="fas fa-check"></i> Concluídas
          </button>
        </div>
      </div>

      <div class="notes-list" id="notesList">
        <p class="empty-state">
          <i class="fas fa-inbox"></i>
          <br>Nenhuma anotação ainda. Comece a digitar!
        </p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
